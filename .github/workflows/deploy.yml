name: Deploy approved app

on:
  workflow_dispatch:
    inputs:
      app:
        description: "App config name from apps/<app>.yml"
        required: true
        type: string
      ref:
        description: "Branch, tag, or commit SHA. Empty uses default_ref."
        required: false
        type: string
      dry_run:
        description: "Validate, build, and package without SSH deploy"
        required: true
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  prepare:
    name: Validate app config
    runs-on: ubuntu-latest
    outputs:
      app_slug: ${{ steps.export.outputs.app_slug }}
      repo: ${{ steps.export.outputs.repo }}
      ref: ${{ steps.export.outputs.ref }}
      runtime: ${{ steps.export.outputs.runtime }}
      github_environment: ${{ steps.export.outputs.github_environment }}
      deployment_url: ${{ steps.export.outputs.deployment_url }}
    steps:
      - name: Checkout ai-deploy
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install script dependencies
        run: python -m pip install -r requirements.txt

      - name: Validate config
        run: python scripts/validate-config.py --app "${{ inputs.app }}"

      - name: Export deploy config
        id: export
        run: |
          mkdir -p dist
          python scripts/export-config.py \
            --app "${{ inputs.app }}" \
            --ref "${{ inputs.ref }}" \
            --github-output "$GITHUB_OUTPUT" \
            --dist dist

      - name: Upload deploy config
        uses: actions/upload-artifact@v4
        with:
          name: deploy-config
          path: dist/deploy.env
          if-no-files-found: error

  build:
    name: Build release bundle
    runs-on: ubuntu-latest
    needs: prepare
    steps:
      - name: Checkout ai-deploy
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install script dependencies
        run: python -m pip install -r requirements.txt

      - name: Download deploy config
        uses: actions/download-artifact@v4
        with:
          name: deploy-config
          path: dist

      - name: Checkout source repository
        env:
          SOURCE_REPO: ${{ needs.prepare.outputs.repo }}
          SOURCE_REF: ${{ needs.prepare.outputs.ref }}
          SOURCE_DIR: source
          SOURCE_REPO_TOKEN: ${{ secrets.SOURCE_REPO_TOKEN }}
        run: bash scripts/checkout-source.sh

      - name: Build source
        run: python scripts/run-build.py --app "${{ inputs.app }}" --source-dir source

      - name: Package release
        run: python scripts/package-artifact.py --app "${{ inputs.app }}" --source-dir source --dist dist

      - name: Upload release bundle
        uses: actions/upload-artifact@v4
        with:
          name: release-bundle
          path: |
            dist/deploy.env
            dist/release.env
            dist/release.tar.gz
          if-no-files-found: error

  deploy:
    name: Deploy to target VM
    runs-on: ubuntu-latest
    needs:
      - prepare
      - build
    if: ${{ inputs.dry_run == false }}
    environment:
      name: ${{ needs.prepare.outputs.github_environment }}
      url: ${{ needs.prepare.outputs.deployment_url }}
    concurrency:
      group: deploy-${{ needs.prepare.outputs.app_slug }}
      cancel-in-progress: false
    steps:
      - name: Checkout ai-deploy
        uses: actions/checkout@v4

      - name: Download release bundle
        uses: actions/download-artifact@v4
        with:
          name: release-bundle
          path: dist

      - name: Deploy over SSH
        env:
          AI_DEPLOY_SSH_HOST: ${{ secrets.AI_DEPLOY_SSH_HOST }}
          AI_DEPLOY_SSH_USER: ${{ secrets.AI_DEPLOY_SSH_USER }}
          AI_DEPLOY_SSH_KEY: ${{ secrets.AI_DEPLOY_SSH_KEY }}
          AI_DEPLOY_SSH_PORT: ${{ secrets.AI_DEPLOY_SSH_PORT }}
          AI_DEPLOY_CERTBOT_EMAIL: ${{ secrets.AI_DEPLOY_CERTBOT_EMAIL }}
          APP_ENV_B64: ${{ secrets.APP_ENV_B64 }}
        run: bash scripts/deploy-over-ssh.sh dist/release.tar.gz dist/deploy.env dist/release.env
